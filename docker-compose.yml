version: "3.9"

services:
  # ─── Banco de dados principal ───────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: sgm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sgm_ferroviario}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgm_network

  # ─── Cache e pub/sub ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sgm_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - sgm_network

  # ─── Message broker ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: sgm_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-sgm}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-sgm_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - sgm_network

  # ─── MQTT Broker (IoT) ──────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.3.0
    container_name: sgm_emqx
    environment:
      EMQX_NAME: sgm_iot
      EMQX_HOST: 0.0.0.0
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_PASSWORD:-emqx_secret}
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # MQTT sobre WebSocket
      - "8084:8084"    # MQTT sobre WSS
      - "8883:8883"    # MQTT sobre TLS
      - "18083:18083"  # Dashboard EMQX
    networks:
      - sgm_network

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgm_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sgm}:${POSTGRES_PASSWORD:-sgm_secret}@postgres:5432/${POSTGRES_DB:-sgm_ferroviario}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-sgm}:${RABBITMQ_PASSWORD:-sgm_secret}@rabbitmq:5672/
      MQTT_BROKER: emqx
      MQTT_PORT: 1883
      SECRET_KEY: ${SECRET_KEY:-super_secret_key_change_in_production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - sgm_network
    restart: unless-stopped

  # ─── Worker Celery (tarefas assíncronas) ────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgm_celery_worker
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sgm}:${POSTGRES_PASSWORD:-sgm_secret}@postgres:5432/${POSTGRES_DB:-sgm_ferroviario}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-sgm}:${RABBITMQ_PASSWORD:-sgm_secret}@rabbitmq:5672/
    depends_on:
      - backend
      - rabbitmq
      - redis
    networks:
      - sgm_network
    restart: unless-stopped

  # ─── Celery Beat (agendador) ─────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgm_celery_beat
    command: celery -A app.worker beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sgm}:${POSTGRES_PASSWORD:-sgm_secret}@postgres:5432/${POSTGRES_DB:-sgm_ferroviario}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-sgm}:${RABBITMQ_PASSWORD:-sgm_secret}@rabbitmq:5672/
    depends_on:
      - celery_worker
    networks:
      - sgm_network
    restart: unless-stopped

  # ─── Frontend Next.js ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sgm_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sgm_network
    restart: unless-stopped

  # ─── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sgm_nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - sgm_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  emqx_data:
  emqx_log:
  media_data:

networks:
  sgm_network:
    driver: bridge
